
###################
### KEYBINDINGS ###
###################

# Set programs that you use
$terminal = kitty
$fileManager = dolphin
$menu = rofi -show drun
$browser = firefox
$editor = code
$game = steam
$colorPicker = hyprpicker



# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.shypr.land/Configuring/Binds/ for more
bind = $mainMod, return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, Delete, exit,
bind = $mainMod, F, exec, $fileManager
bind = $mainMod, B, exec, $browser #--password-store=gnome
bind = $mainMod SHIFT, B, exec, $browser --private-window
bind = $mainMod, C, exec, $editor
bind = $mainMod, M, exec, spicetify apply#$music
bind = $mainMod, G, exec, $game
bind = $mainMod, P, exec, $colorPicker --autocopy

#Wallpapers
bind = $mainMod, W, exec, ~/.config/hypr/scripts/random_wallpaper.sh
bind = $mainMod SHIFT, W, exec, ~/.config/hypr/scripts/wallpaper-launcher.sh

bindl = $mainMod, L, exec, hyprlock
bind = Ctrl, Escape, exec, killall waybar || waybar
bindl = SUPER, Escape, exec, pkill wlogout || wlogout --buttons-per-row=5

# Rofi binds
$rofi_theme = ~/.config/rofi/launchers/type-1/style-3.rasi
bind = $mainMod, SPACE, exec, pkill rofi || ~/.config/rofi/launchers/type-1/launcher.sh -drun
bind = $mainMod, equal, exec, pkill rofi || rofi -show calc -config $rofi_theme
bind = $mainMod SHIFT, SPACE, exec, pkill rofi || rofi -modi "emoji:rofimoji -a copy" -show emoji -config $rofi_theme
# Cliphist
bind = $mainMod, V, exec, pkill rofi || rofi -show clipboard -modi clipboard:~/.config/rofi/scripts/cliphist-rofi-img -show-icons -config ~/.config/rofi/launchers/type-1/style-3.rasi# Calculator

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bindd = ALT, Tab,$d Cycle focus, cyclenext
bind = $win, T, togglefloating,

# Resize windows
bindde = $mainMod Shift, Right, $d resize window right , resizeactive, 30 0
bindde = $mainMod Shift, Left, $d resize window left, resizeactive, -30 0
bindde = $mainMod Shift, Up, $d resize window up, resizeactive, 0 -30
bindde = $mainMod Shift, Down, $d resize  window down, resizeactive, 0 30

$moveactivewindow=grep -q "true" <<< $(hyprctl activewindow -j | jq -r .floating) && hyprctl dispatch moveactive
bindde = $mainMod Shift Control, left, Move active window to the left, exec, $moveactivewindow -30 0 || hyprctl dispatch movewindow l
bindde = $mainMod Shift Control, right, Move active window to the right, exec, $moveactivewindow 30 0 || hyprctl dispatch movewindow r
bindde = $mainMod Shift Control, up, Move active window up, exec, $moveactivewindow  0 -30 || hyprctl dispatch movewindow u
bindde = $mainMod Shift Control, down, Move active window down, exec, $moveactivewindow 0 30 || hyprctl dispatch movewindow d


# Switch workspaces with mainMod + [0-9]
bind = $mainMod, ampersand, workspace, 1
bind = $mainMod, eacute, workspace, 2
bind = $mainMod, quotedbl, workspace, 3
bind = $mainMod, apostrophe, workspace, 4
bind = $mainMod, parenleft, workspace, 5
bind = $mainMod, minus, workspace, 6
bind = $mainMod, egrave, workspace, 7
bind = $mainMod, underscore, workspace, 8
bind = $mainMod, ccedilla, workspace, 9
bind = $mainMod, agrave, workspace, 10

# Switch workspace with arrows
bindd = $mainMod Control, Right, $d change active workspace forwards  , workspace, r+1
bindd = $mainMod Control, Left, $d change active workspace backwards , workspace, r-1


# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, ampersand, movetoworkspace, 1
bind = $mainMod SHIFT, eacute, movetoworkspace, 2
bind = $mainMod SHIFT, quotedbl, movetoworkspace, 3
bind = $mainMod SHIFT, apostrophe, movetoworkspace, 4
bind = $mainMod SHIFT, parenleft, movetoworkspace, 5
bind = $mainMod SHIFT, minus, movetoworkspace, 6
bind = $mainMod SHIFT, egrave, movetoworkspace, 7
bind = $mainMod SHIFT, underscore, movetoworkspace, 8
bind = $mainMod SHIFT, ccedilla, movetoworkspace, 9
bind = $mainMod SHIFT, agrave, movetoworkspace, 10

# Move focused window to a workspace silently
bindd = $mainMod Alt, ampersand, $d move to workspace 1  (silent), movetoworkspacesilent, 1
bindd = $mainMod Alt, eacute, $d move to workspace 2  (silent), movetoworkspacesilent, 2
bindd = $mainMod Alt, quotedbl, $d move to workspace 3  (silent), movetoworkspacesilent, 3
bindd = $mainMod Alt, apostrophe, $d move to workspace 4  (silent), movetoworkspacesilent, 4
bindd = $mainMod Alt, parenleft, $d move to workspace 5  (silent), movetoworkspacesilent, 5
bindd = $mainMod Alt, minus, $d move to workspace 6  (silent), movetoworkspacesilent, 6
bindd = $mainMod Alt, egrave, $d move to workspace 7  (silent), movetoworkspacesilent, 7
bindd = $mainMod Alt, underscore, $d move to workspace 8  (silent), movetoworkspacesilent, 8
bindd = $mainMod Alt, ccedilla, $d move to workspace 9  (silent), movetoworkspacesilent, 9
bindd = $mainMod Alt, agrave, $d move to workspace 10 (silent), movetoworkspacesilent, 10

# Example special workspace (scratchpad)
bind = $mainMod, A, togglespecialworkspace, magic
bind = $mainMod SHIFT, A, movetoworkspace, special:magic
bindd = $mainMod Alt, A, $d move to workspace 1  (silent), movetoworkspacesilent, special:magic


# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume 
bindle=, XF86AudioRaiseVolume, exec, swayosd-client --output-volume 2
bindle=, XF86AudioLowerVolume, exec, exec  swayosd-client --output-volume -2
bindle=,XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bindle = , XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
# Screen brightness
bindle = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bindle = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# Requires playerctl
bindl = $mainMod, XF86AudioRaiseVolume, exec, swayosd-client --playerctl next
bindl = $mainMod, XF86AudioMute, exec, swayosd-client --playerctl play-pause
bindl = $mainMod, XF86AudioLowerVolume, exec, swayosd-client --playerctl previous

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# add --cursor flag to include cursor also, --freeze flag to freeze before selection
# Select area to take screenshot
bind = $mainMod SHIFT,S, exec, grimblast --freeze --notify copysave area ~/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%m-%s).png