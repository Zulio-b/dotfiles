##############################
### WINDOWS AND WORKSPACES ###
##############################

# https://wiki.hypr.land/0.52.0/Configuring/Binds/ 

$mainMod=SUPER
$rofi_theme = ~/.config/rofi/launchers/type-1/style-3.rasi

$terminal = kitty
$fileManager = dolphin
$menu = rofi -show drun
$browser = firefox
$editor = code
$game = steam
$colorPicker = hyprpicker

# --- Basic Binds ---
bindd = $mainMod, return, Open terminal, exec, $terminal
bindd = $mainMod, Q, Kill active window, killactive, 
bindd = $mainMod, Delete, Exit Hyprland, exit, 
bindd = $mainMod, F, Open file manager (Yazi), exec, kitty --class "yazi" -e yazi
bindd = $mainMod SHIFT, F, Open file manager (Dolphin), exec, $fileManager
bindd = $mainMod, B, Open browser, exec, $browser
bindd = $mainMod SHIFT, B, Open browser (private), exec, $browser --private-window
bindd = $mainMod, C, Open code editor, exec, $editor
bindd = $mainMod, M, Apply Spicetify theme, exec, spicetify apply
bindd = $mainMod, G, Open Steam, exec, $game
bindd = $mainMod, P, Pick color, exec, $colorPicker --autocopy

# --- Wallpapers ---
bindd = $mainMod, W, Set random wallpaper, exec, ~/.config/hypr/scripts/random_wallpaper.sh
bindd = $mainMod SHIFT, W, Open wallpaper launcher, exec, ~/.config/hypr/scripts/wallpaper-launcher.sh

binddl = $mainMod, L, Lock screen, exec, hyprlock
bindd = Ctrl, Escape, Toggle Waybar, exec, killall waybar || waybar
binddl = SUPER, Escape, Toggle wlogout, exec, pkill wlogout || wlogout --buttons-per-row=5

# --- Rofi Binds ---
bindd = $mainMod SHIFT, comma, Show keybindings cheatsheet, exec, ~/.config/hypr/scripts/hypr-cheatsheet.sh
bindd = $mainMod, SPACE, App launcher, exec, pkill rofi || ~/.config/rofi/launchers/type-1/launcher.sh -drun -terminal kitty
bindd = $mainMod, equal, Calculator, exec, pkill rofi || rofi -show calc -config $rofi_theme
bindd = $mainMod SHIFT, SPACE, Emoji picker, exec, pkill rofi || rofi -modi "emoji:rofimoji" -show emoji -config $rofi_theme
bindd = $mainMod, V, Clipboard history, exec, pkill rofi || rofi -show clipboard -modi clipboard:~/.config/rofi/scripts/cliphist-rofi-img -show-icons -config $rofi_theme

# --- Move Focus ---
bindd = $mainMod, left, Focus window left, movefocus, l
bindd = $mainMod, right, Focus window right, movefocus, r
bindd = $mainMod, up, Focus window up, movefocus, u
bindd = $mainMod, down, Focus window down, movefocus, d
bindd = ALT, Tab, Cycle focus, cyclenext
bindd = $mainMod, T, Toggle floating, togglefloating,

# --- Resize Windows ---
bindde = $mainMod Shift, Right, Resize window right, resizeactive, 30 0
bindde = $mainMod Shift, Left, Resize window left, resizeactive, -30 0
bindde = $mainMod Shift, Up, Resize window up, resizeactive, 0 -30
bindde = $mainMod Shift, Down, Resize window down, resizeactive, 0 30

# --- Move Active Window ---
bindde = $mainMod Shift Control, left, Move active window left, exec, $moveactivewindow -30 0 || hyprctl dispatch movewindow l
bindde = $mainMod Shift Control, right, Move active window right, exec, $moveactivewindow 30 0 || hyprctl dispatch movewindow r
bindde = $mainMod Shift Control, up, Move active window up, exec, $moveactivewindow 0 -30 || hyprctl dispatch movewindow u
bindde = $mainMod Shift Control, down, Move active window down, exec, $moveactivewindow 0 30 || hyprctl dispatch movewindow d

# --- Switch Workspaces (AZERTY) ---
bindd = $mainMod, ampersand, Workspace 1, workspace, 1
bindd = $mainMod, eacute, Workspace 2, workspace, 2
bindd = $mainMod, quotedbl, Workspace 3, workspace, 3
bindd = $mainMod, apostrophe, Workspace 4, workspace, 4
bindd = $mainMod, parenleft, Workspace 5, workspace, 5
bindd = $mainMod, minus, Workspace 6, workspace, 6
bindd = $mainMod, egrave, Workspace 7, workspace, 7
bindd = $mainMod, underscore, Workspace 8, workspace, 8
bindd = $mainMod, ccedilla, Workspace 9, workspace, 9
bindd = $mainMod, agrave, Workspace 10, workspace, 10

bindd = $mainMod Control, Right, Change workspace forwards, workspace, r+1
bindd = $mainMod Control, Left, Change workspace backwards, workspace, r-1

# --- Move Window to Workspace ---
bindd = $mainMod SHIFT, ampersand, Move to workspace 1, movetoworkspace, 1
bindd = $mainMod SHIFT, eacute, Move to workspace 2, movetoworkspace, 2
bindd = $mainMod SHIFT, quotedbl, Move to workspace 3, movetoworkspace, 3
bindd = $mainMod SHIFT, apostrophe, Move to workspace 4, movetoworkspace, 4
bindd = $mainMod SHIFT, parenleft, Move to workspace 5, movetoworkspace, 5
bindd = $mainMod SHIFT, minus, Move to workspace 6, movetoworkspace, 6
bindd = $mainMod SHIFT, egrave, Move to workspace 7, movetoworkspace, 7
bindd = $mainMod SHIFT, underscore, Move to workspace 8, movetoworkspace, 8
bindd = $mainMod SHIFT, ccedilla, Move to workspace 9, movetoworkspace, 9
bindd = $mainMod SHIFT, agrave, Move to workspace 10, movetoworkspace, 10

# --- Move to Workspace Silently ---
bindd = $mainMod Alt, ampersand, Move to workspace 1 (silent), movetoworkspacesilent, 1
bindd = $mainMod Alt, eacute, Move to workspace 2 (silent), movetoworkspacesilent, 2
bindd = $mainMod Alt, quotedbl, Move to workspace 3 (silent), movetoworkspacesilent, 3
bindd = $mainMod Alt, apostrophe, Move to workspace 4 (silent), movetoworkspacesilent, 4
bindd = $mainMod Alt, parenleft, Move to workspace 5 (silent), movetoworkspacesilent, 5
bindd = $mainMod Alt, minus, Move to workspace 6 (silent), movetoworkspacesilent, 6
bindd = $mainMod Alt, egrave, Move to workspace 7 (silent), movetoworkspacesilent, 7
bindd = $mainMod Alt, underscore, Move to workspace 8 (silent), movetoworkspacesilent, 8
bindd = $mainMod Alt, ccedilla, Move to workspace 9 (silent), movetoworkspacesilent, 9
bindd = $mainMod Alt, agrave, Move to workspace 10 (silent), movetoworkspacesilent, 10

# --- Scratchpad ---
bindd = $mainMod, A, Toggle scratchpad, togglespecialworkspace, magic
bindd = $mainMod SHIFT, A, Move window to scratchpad, movetoworkspace, special:magic
bindd = $mainMod Alt, A, Move to scratchpad (silent), movetoworkspacesilent, special:magic

# --- Scroll Workspaces ---
bindd = $mainMod, mouse_down, Next workspace (scroll), workspace, e+1
bindd = $mainMod, mouse_up, Previous workspace (scroll), workspace, e-1

# --- Mouse Window Controls ---
binddm = $mainMod, mouse:272, Move window (LMB drag), movewindow
binddm = $mainMod, mouse:273, Resize window (RMB drag), resizewindow

# --- Audio (SwayOSD) ---
binddle =, XF86AudioRaiseVolume, Volume +2%, exec, swayosd-client --output-volume 2
binddle =, XF86AudioLowerVolume, Volume -2%, exec, swayosd-client --output-volume -2
binddle =, XF86AudioMute, Toggle mute, exec, swayosd-client --output-volume mute-toggle
binddle =, XF86AudioMicMute, Toggle mic mute, exec, swayosd-client --input-volume mute-toggle

# --- Brightness ---
binddle =, XF86MonBrightnessUp, Brightness up, exec, swayosd-client --brightness raise
binddle =, XF86MonBrightnessDown, Brightness down, exec, swayosd-client --brightness lower

# --- Media Control (Super + Volume keys) ---
binddl = $mainMod, XF86AudioRaiseVolume, Next track, exec, swayosd-client --playerctl next
binddl = $mainMod, XF86AudioMute, Play/Pause, exec, swayosd-client --playerctl play-pause
binddl = $mainMod, XF86AudioLowerVolume, Previous track, exec, swayosd-client --playerctl previous

# --- Media Control (Dedicated keys) ---
binddl =, XF86AudioNext, Next track, exec, playerctl next
binddl =, XF86AudioPause, Pause, exec, playerctl play-pause
binddl =, XF86AudioPlay, Play, exec, playerctl play-pause
binddl =, XF86AudioPrev, Previous track, exec, playerctl previous

# --- Screenshot ---
bindd = $mainMod SHIFT, S, Screenshot area, exec, grimblast --freeze --notify copysave area ~/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png
bindd = $mainMod SHIFT Control, S, Screenshot full screen, exec, grimblast --notify copysave screen ~/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png