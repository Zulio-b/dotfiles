##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# --- Global Window Rules ---

# Fix some dragging issues with XWayland (Corrected to v2)
windowrule {
  name = windowrule-1
  no_focus = on
  match:class = ^$
  match:title = ^$
  match:xwayland = 1
  match:float = 1
  match:fullscreen = 0
  match:pin = 0
}


# --- Wlogout Rules ---
# NOTE: wlogout is a Layer, not a Window. You cannot set opacity via windowrule.
# To change opacity, edit your ~/.config/wlogout/style.css (e.g., window { background-color: rgba(0,0,0,0.5); })
layerrule {
  name = layerrule-1
  blur = on
  match:namespace = logout_dialog
}



##############################
######### WORKSPACES #########
##############################

# --- Tagging ---
# Assign tags to specific apps
windowrule {
  name = windowrule-4
  tag = +games
  match:class = ^(steam_app_\d+)$
}

windowrule {
  name = windowrule-5
  tag = +games
  match:class = ^(gamescope)$
}

windowrule {
  name = tag_util
  tag = +utility
  match:class = ^(blueman-manager)$
}
windowrule {
  name = tag_util2
  tag = +utility
  match:class = ^(org.pulseaudio.pavucontrol)$
}
windowrule {
  name = tag_util_cpu
  tag = +utility
  match:class = ^(org.kde.plasma-systemmonitor)$
}

windowrule {
  name = tagutil-save-photo
  tag = +utility
  match:title = ^(Save Image — Gwenview)$
}
# --- Game Rules (Targeting tag:games) ---
windowrule {
  name = windowrule-67
  idle_inhibit = always
  fullscreen = on
  opaque = on
  rounding = 0
  workspace = 6
  match:tag = games
}


# --- Utility Rules (Targeting tag:utility) ---
windowrule {
  name = windowrule-8
  float = on
  size = (monitor_w*0.5) (monitor_h*0.5)
  match:tag = utility
}

# --- Specific App Workspace Rules ---
windowrule {
  name = windowrule-9
  workspace = 5 silent
  match:class = ^(.*spotify.*)$
}

windowrule {
  name = windowrule-10
  workspace = 6 silent
  match:class = ^(.*steam.*)$
}
